<!DOCTYPE html>
<html style="background: #1e1e1e; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
<head>
  <style>
    body {
      background: #1e1e1e;
      color: #e0e0e0;
      margin: 0;
      padding: 20px;
      padding-top: 70px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    h2 {
      color: #ffffff;
      margin-top: 20px;
      margin-bottom: 10px;
      border-bottom: 2px solid #0d47a1;
      padding-bottom: 8px;
    }
    .btn {
      background: #0d47a1;
      color: #ffffff;
      border: none;
      padding: 8px 16px;
      margin: 5px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #1565c0;
    }
    .btn:active {
      background: #0d47a1;
    }
    textarea {
      background: #2d2d2d;
      color: #e0e0e0;
      border: 1px solid #444444;
      border-radius: 4px;
      padding: 10px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
    }
    input {
      background: #2d2d2d;
      color: #e0e0e0;
      border: 1px solid #444444;
      padding: 8px;
      font-size: 14px;
    }
    label {
      color: #b0b0b0;
    }
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 10px;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(30, 30, 30, 0.95);
      border-bottom: 2px solid #0d47a1;
      padding: 12px 20px;
      z-index: 1000;
      backdrop-filter: blur(4px);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    }
    .status-light {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #cc0000;
      box-shadow: 0 0 10px rgba(204, 0, 0, 0.5);
      animation: pulse-red 1s infinite;
    }
    .status-light.connected {
      background: #00cc00;
      box-shadow: 0 0 10px rgba(0, 204, 0, 0.5);
      animation: pulse-green 1s infinite;
    }
    @keyframes pulse-red {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes pulse-green {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .status-text {
      font-weight: bold;
      font-size: 14px;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 10px;
    }
    form > div {
      display: flex;
      flex-direction: column;
    }
    input[type="number"] {
      width: 200px;
    }
    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }
    ::-webkit-scrollbar-thumb {
      background: #555;
      border-radius: 6px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #777;
    }
    /* Firefox scrollbar */
    * {
      scrollbar-color: #555 transparent;
      scrollbar-width: thin;
    }
  </style>
  <script defer src="renderer.js"></script>
</head>
<body>
  <div class="status-indicator">
    <div class="status-light" id="statusLight"></div>
    <span class="status-text">Deadlock: <span id="statusText">Not Connected</span></span>
  </div>

  <div class="button-row">
    <button id="testDeviceBtn" class="btn">Test Device</button>
    <button id="restartPythonBtn" class="btn">Restart Python</button>
    <button id="toggleEventLogBtn" class="btn">Show Event Log</button>
  </div>

  <div>
    <h2>Log:</h2>
    <textarea id="TerminalTextArea" style="width: calc(100% - 20px); height: 250px; resize: none;" readonly spellcheck="false"></textarea>
    <button id="clearTerminalTextAreaBtn" class="btn" style="margin-top: 10px;">Clear</button>
  </div>

  <div id="eventLogSection" style="display: none;">
    <h2>Game Events Log:</h2>
    <textarea id="GameEventsTextArea" style="width: calc(100% - 20px); height: 250px; resize: none;" readonly spellcheck="false"></textarea>
    <button id="clearGameEventsTextAreaBtn" class="btn" style="margin-top: 10px;">Clear</button>
  </div>

  <div id="configSection">
    <h2>Configuration</h2>
    <form id="configForm">
      <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px;">Max Shock:</label>
        <input type="number" id="maxShockInput" name="max_shock" value="50" />
      </div>
      <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px;">Min Shock:</label>
        <input type="number" id="minShockInput" name="min_shock" value="10" />
      </div>
      <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px;">Shock Decay Time (Seconds):</label>
        <input type="number" id="minShockTimeInput" name="min_shock_time" value="900" />
      </div>
      <div style="margin-bottom: 15px; flex-direction: row; align-items: center; gap: 8px;">
        <input type="checkbox" id="shockEnabledInput" name="shock_on_death" checked style="margin: 0;" />
        <label for="shockEnabledInput" style="margin: 0; cursor: pointer;">Enable Shock On Death</label>
      </div>
      <div style="margin-bottom: 15px; flex-direction: row; align-items: center; gap: 8px;">
        <input type="checkbox" id="vibrationEnabledInput" name="vibrate_on_hurt" checked style="margin: 0;" />
        <label for="vibrationEnabledInput" style="margin: 0; cursor: pointer;">Enable Vibration When Taking Damage</label>
      </div>
      <button type="submit" id="submitConfigBtn" class="btn" style="margin-top: 10px;">Submit Configuration</button>
    </form>
  </div>

  <script>
    window.app.initialize();
  </script>
</body>
</html>
